# architecture
arch: UNet
enc_arch: 
dec_arch: 

# wandb
proj_name: UNet
run_name: unet_uc-inference
wandb_id: 
disable_wandb: 1
wandb_proj: 

# dataset
dataset: prostate
# data_path: /data/leizhou/
task: Task2301_uc_prostate
data_path:  /workspace1/project_jxfdv/ssl_prostate_data/nnUNet_raw_data/${task}
overviews_dir: /workspace1/project_jxfdv/ssl_prostate_data/overviews/UNet/overviews/${task}
json_list: 'split0.json'
data_seed: 12345
augmentation_seeds: [0,1,2,3,4,5,6,7]
ts_fold: 0
ts_ratio: 0.
resume: /workspace1/project_jxfdv/ssl_prostate_final_models/ssl_original/unet/stage3/uc/unet_scratch_uc_f0/ckpts/best_model.pth.tar
# /mnt/researchers/denis-parra/datasets/aetamayo/outputs/stage3_uc/unet_(1-3)_dae_uc_f4_picai25_14-01-2026_18_36_37/best_model.pth.tar
# /mnt/researchers/denis-parra/datasets/aetamayo/outputs/stage3_uc/unet_(1-3)_dae_uc_f4_picai25_14-01-2026_18_36_38/best_model.pth.tar
# /mnt/researchers/denis-parra/datasets/aetamayo/outputs/stage3_uc/unet_(1-3)_dae_uc_f4_picai25_14-01-2026_18_36_37/best_model.pth.tar
metrics_dir:  metrics/uc/unet_scratch_uc_f0/
save_roc_data: True # True mean save roc curve data
metrics_threshold: 0.5

# output
output_dir: none
ckpt_dir: none

# data preprocessing
roi_x: 32
roi_y: 256
roi_z: 256
RandFlipd_prob: 0.2
RandRotate90d_prob: 0.2
RandScaleIntensityd_prob: 0.1
RandShiftIntensityd_prob: 0.1
infer_overlap: 0.5
spatial_dim: 3
cache_rate: 1.
num_samples: 1
image_shape: [32, 256, 256]
num_channels: 3

# trainer
trainer_name: SegTrainer2
batch_size: 2
val_batch_size: 1 # per gpu
use_test_augmentation: false
start_epoch: 0
warmup_epochs: 10
epochs: 200
workers: 8
num_threads: ${workers}
pretrain: 
#resume: /mnt/researchers/denis-parra/datasets/aetamayo/outputs/stage3_uc/unet_scratch_uc_f4/ckpts/best_model.pth.tar
start_from: 
save_intermediate: false
# drop
drop_path: 0.1
# tricks
mixup: 0.
cutmix: 0.
label_smoothing: 0.

# model
patch_size: 16
in_chans: 3
out_chans: 2
model_strides: [[2, 2, 2], [1, 2, 2], [1, 2, 2], [1, 2, 2], [2, 2, 2]]
model_features: [32, 64, 128, 256, 512, 1024]

# loss
smooth_nr: 0.0
smooth_dr: 1e-6

# optimizer
type: adamw
lr: 0.011
beta1: 0.9
beta2: 0.95 #0.999
weight_decay: 0.05 #1e-5
layer_decay: 0.75
start_from_lr: 

# logging
# vis_freq: 100
vis_batch_size: 4
save_freq: 5
eval_freq: 5
print_freq: 3

# distributed processing
gpu: 0
dist_url: # 'tcp://localhost:10001'
world_size: 1
multiprocessing_distributed: false
dist_backend: nccl
distributed:
rank: 0
ngpus_per_node:

# randomness
seed: 5

# debugging
debug: false
manual_test: false
get_best_model: false
evaluate: True

num_classes: 2

# ensemble testing
eval_test: false
models_root_dir: 
models_to_ensemble: [] # Aqui deben ser los nombres de las run. dae pueden ser del mismo tipo de arquitectura
metrics_save_path: 

# mass testing
fold_id: 0
mass_testing: False
model_final_dir: /workspace1/project_jxfdv/
models_to_test: {
  0: [
      ssl_prostate_final_models/ssl_original/unet/stage3/uc/unet_scratch_uc_f0/ckpts/best_model.pth.tar
    ],
  #1: [/unetr/stage3/p158/unetr_full_dae_p158f1/ckpts/best_model.pth.tar,]
}
save_path_metrics: /home/dicampanini/ssl-prostate/metrics/extra_metrics